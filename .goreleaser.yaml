project_name: kiro-bridge

before:
  hooks:
    - go mod tidy

builds:
  - ldflags:
      - -X main.version={{ .Version }}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: szympajka
    name: kiro-bridge
